<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Portal — Eng. Adnan Saffarini Office</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --sky:#2B9EB3;--sky2:#3BBDD4;--sky-light:#E8F7FA;
  --amber:#E8873A;--amber-light:#FEF3EA;
  --green:#3DA882;--green-light:#E8F7F2;
  --sand:#F5EEE4;--cream:#FFFBF5;
  --terra:#C4704F;
  --dark:#2C3E50;--mid:#5A6A7A;--muted:#8FA0B0;
  --border:#E2ECF0;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}

body{
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--sky-light) 0%,var(--cream) 45%,var(--amber-light) 80%,var(--green-light) 100%);
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 30%,rgba(43,158,179,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 70%,rgba(61,168,130,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(232,135,58,0.05) 0%,transparent 40%);
}

/* ── Floating shapes ── */
body::after{
  content:'';position:absolute;width:400px;height:400px;
  border-radius:50%;background:rgba(43,158,179,0.04);
  top:-100px;right:-100px;pointer-events:none;
}

.login-card{
  width:420px;max-width:92vw;
  background:rgba(255,251,245,0.92);
  border:1px solid rgba(226,236,240,0.8);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:24px;
  padding:44px 40px 38px;
  animation:fadeUp .6s ease both;
  position:relative;
  box-shadow:0 20px 60px rgba(43,158,179,0.10),0 4px 16px rgba(0,0,0,0.06);
}

/* Brand header */
.brand{text-align:center;margin-bottom:36px}
.brand-icon{
  width:60px;height:60px;
  background:linear-gradient(135deg,var(--sky),var(--sky2));
  border-radius:18px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(43,158,179,0.25);
}
.brand-icon i{font-size:28px;color:#fff}
.brand h2{font-size:18px;font-weight:700;color:var(--dark);letter-spacing:-.2px}
.brand .tagline{font-size:12px;color:var(--muted);margin-top:5px;letter-spacing:.2px}

/* Form fields */
.field{margin-bottom:20px}
.field label{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--mid);margin-bottom:8px;
}
.field label i{font-size:13px;color:var(--sky)}
.field input{
  width:100%;
  background:#fff;
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:13px 16px;
  color:var(--dark);font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{
  border-color:var(--sky);
  box-shadow:0 0 0 3px rgba(43,158,179,0.12);
}
.field input::placeholder{color:var(--muted)}

/* Submit button */
.btn-login{
  width:100%;
  background:linear-gradient(135deg,var(--sky),var(--sky2));
  color:#fff;border:none;
  padding:15px;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;
  letter-spacing:.03em;transition:all .2s;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 20px rgba(43,158,179,0.28);
}
.btn-login:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 10px 28px rgba(43,158,179,0.34)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-login .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-text{display:none}

/* Divider */
.divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--muted);font-size:11px;letter-spacing:.5px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Guest button */
.btn-guest{
  width:100%;background:transparent;
  border:1.5px solid var(--border);
  border-radius:12px;padding:13px;
  color:var(--mid);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.02em;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-guest i{font-size:15px;color:var(--amber)}
.btn-guest:hover{border-color:var(--sky);color:var(--sky);background:rgba(43,158,179,0.04)}

/* Error message */
.error-msg{
  background:rgba(196,112,79,0.08);border:1px solid rgba(196,112,79,0.25);
  color:var(--terra);border-radius:10px;
  padding:10px 14px;font-size:12px;margin-bottom:16px;
  display:none;text-align:center;
  display:flex;align-items:center;gap:8px;
}
.error-msg.show{display:flex;animation:fadeUp .3s ease}
.error-msg i{font-size:15px;flex-shrink:0}

/* Footer link */
.footer{text-align:center;margin-top:24px}
.footer a{color:var(--muted);font-size:11px;text-decoration:none;transition:color .2s;display:inline-flex;align-items:center;gap:4px}
.footer a:hover{color:var(--sky)}
.footer a i{font-size:12px}

/* Secure badge */
.sec-badge{
  position:absolute;top:18px;right:20px;
  display:flex;align-items:center;gap:5px;
  font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;
}
.sec-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2.5s infinite}

/* Decorative bottom bar */
.card-accent{
  position:absolute;bottom:0;left:24px;right:24px;height:3px;
  background:linear-gradient(90deg,var(--sky),var(--amber),var(--green));
  border-radius:0 0 24px 24px;
}

  /* ── DARK OVERRIDE ── */
  :root {
    --sky:#e87d1e; --sky2:#f09340; --sky-light:rgba(232,125,30,.12);
    --amber:#e87d1e; --amber-light:rgba(232,125,30,.1);
    --sand:#141414; --cream:#0a0a0a;
    --dark:#f2f2f2; --mid:#a0a0a0; --muted:#7a7a7a;
    --border:#2a2a2a;
  }
  body{background:#0a0a0a!important;color:#f2f2f2!important}
  .login-box,.login-card,.card,.form-box{background:#141414!important;border-color:#2a2a2a!important;color:#f2f2f2!important}
  .form-group label{color:#a0a0a0!important}
  input[type=text],input[type=password],input[type=email]{background:#1c1c1c!important;border-color:#2a2a2a!important;color:#f2f2f2!important}
  input:focus{border-color:#e87d1e!important}
  .btn-login,.btn-primary{background:#e87d1e!important;border-color:#e87d1e!important;color:#fff!important}
  .brand h2,.brand-title{color:#f2f2f2!important}
  .tagline,.brand-sub{color:#7a7a7a!important}
  .sec-badge{background:rgba(232,125,30,.1)!important;color:#e87d1e!important;border-color:#e87d1e!important}
  .error-msg{background:rgba(220,38,38,.1)!important;border-color:#DC2626!important;color:#f87171!important}
  .login-container,.right-panel,.left-panel{background:#0a0a0a!important}
  .left-bg,.promo-panel{background:#141414!important}

</style>
</head>
<body>

<div class="login-card">
  <div class="card-accent"></div>
  <div class="sec-badge"><span class="sec-dot"></span> Secure</div>

  <div class="brand">
    <img src="https://www.saffarinidxb.com/images/logo.png" alt="Eng. Adnan Saffarini Office" style="height:40px;width:auto;object-fit:contain">
    <h2 style="color:#f2f2f2">Safarini Junior</h2>
    <div class="tagline" style="color:#7a7a7a">Staff Login Portal</div>
  </div>

  <div class="error-msg" id="error" style="display:none">
    <i class="ti ti-alert-circle"></i>
    <span id="error-text"></span>
  </div>

  <form id="loginForm" autocomplete="on">
    <div class="field">
      <label><i class="ti ti-user"></i> Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label><i class="ti ti-lock"></i> Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">
      <span class="spinner"></span>
      <span class="btn-text">Sign In &nbsp;<i class="ti ti-arrow-right"></i></span>
    </button>
  </form>

  <div class="divider">or</div>

  <button class="btn-guest" id="guestBtn">
    <i class="ti ti-eye"></i> Continue as Guest (View Only)
  </button>

  <div class="footer">
    <a href="/"><i class="ti ti-arrow-left"></i> Back to Main Site</a>
  </div>
</div>

<script>
const form=document.getElementById('loginForm');
const errorEl=document.getElementById('error');
const errorText=document.getElementById('error-text');
const loginBtn=document.getElementById('loginBtn');
const guestBtn=document.getElementById('guestBtn');

if(localStorage.getItem('sf_token')){
  window.location.href='/app.html';
}

function showError(msg){
  errorText.textContent=msg;
  errorEl.classList.add('show');
  errorEl.style.display='flex';
}
function hideError(){
  errorEl.classList.remove('show');
  errorEl.style.display='none';
}

form.addEventListener('submit',async e=>{
  e.preventDefault();
  hideError();
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  if(!username||!password){showError('Please enter both username and password.');return}

  loginBtn.classList.add('loading');
  loginBtn.disabled=true;

  try{
    const res=await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data=await res.json();
    if(!res.ok){showError(data.error||'Login failed. Please check your credentials.');return}
    localStorage.setItem('sf_token',data.token);
    localStorage.setItem('sf_user',JSON.stringify(data.user));
    window.location.href='/app.html';
  }catch(err){
    showError('Network error. Please check the server is running.');
  }finally{
    loginBtn.classList.remove('loading');
    loginBtn.disabled=false;
  }
});

guestBtn.addEventListener('click',async()=>{
  guestBtn.disabled=true;
  guestBtn.innerHTML='<i class="ti ti-loader-2" style="animation:spin .6s linear infinite"></i> Loading…';
  try{
    const res=await fetch('/api/auth/guest',{method:'POST'});
    const data=await res.json();
    localStorage.setItem('sf_token',data.token);
    localStorage.setItem('sf_user',JSON.stringify(data.user));
    window.location.href='/app.html';
  }catch(err){
    showError('Network error. Please try again.');
    guestBtn.disabled=false;
    guestBtn.innerHTML='<i class="ti ti-eye"></i> Continue as Guest (View Only)';
  }
});
</script>
</body>
</html>
