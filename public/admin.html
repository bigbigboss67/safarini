<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Saffarini Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a;--surf1:#141414;--surf2:#1c1c1c;--surf3:#242424;
      --orange:#e87d1e;--text:#f2f2f2;--muted:#7a7a7a;
      --border:rgba(255,255,255,.09);
    }
    body{
      min-height:100vh;background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      font-family:'Inter',system-ui,sans-serif;color:var(--text);
      background-image:radial-gradient(ellipse at 50% 0%,rgba(232,125,30,.08) 0%,transparent 60%);
    }
    .login-card{
      background:var(--surf1);border:1px solid var(--border);
      border-radius:18px;padding:48px 40px;width:min(94vw,420px);
      text-align:center;
      box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
    }
    .login-logo{margin-bottom:28px;}
    .login-logo img{height:52px;object-fit:contain;}
    .accent-bar{width:40px;height:2px;background:#e87d1e;margin:14px auto 0;border-radius:2px;}
    .login-title{font-size:1.35rem;font-weight:700;margin:0 0 6px;color:#f2f2f2;}
    .login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
    .field{margin-bottom:18px;text-align:left;}
    .field label{
      display:block;font-size:11px;font-weight:700;color:var(--muted);
      margin-bottom:7px;letter-spacing:.08em;text-transform:uppercase;
    }
    .field-wrap{position:relative;}
    .field-wrap i{
      position:absolute;left:13px;top:50%;transform:translateY(-50%);
      color:var(--muted);font-size:17px;pointer-events:none;
    }
    .field input{
      width:100%;background:var(--surf2);border:1px solid var(--border);
      border-radius:8px;padding:11px 14px 11px 42px;
      font-size:14px;color:var(--text);outline:none;
      transition:border-color .18s,box-shadow .18s;
      font-family:inherit;
    }
    .field input:focus{
      border-color:var(--orange);
      box-shadow:0 0 0 3px rgba(232,125,30,.15);
    }
    .field input::placeholder{color:#3a3a3a;}
    .btn-login{
      width:100%;background:var(--orange);color:#fff;border:none;
      border-radius:8px;padding:13px;font-size:15px;font-weight:600;
      cursor:pointer;margin-top:8px;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:background .18s,transform .1s;
      font-family:inherit;
    }
    .btn-login:hover{background:#c96810;}
    .btn-login:active{transform:scale(.98);}
    .error-msg{
      color:#f44336;font-size:12.5px;margin-top:14px;
      display:none;align-items:center;justify-content:center;gap:6px;
      background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.2);
      padding:9px 14px;border-radius:7px;
    }
    .footer-note{
      font-size:11px;color:#3a3a3a;margin-top:28px;
      padding-top:20px;border-top:1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="https://www.saffarinidxb.com/images/logo.png" alt="Saffarini Logo">
    </div>

    <h1 class="login-title">Admin Portal</h1>
    <div class="accent-bar"></div>
    <p class="login-sub" style="margin-top:14px;">Enter your credentials to access the dashboard</p>

    <div class="field">
      <label>Username</label>
      <div class="field-wrap">
        <i class="ti ti-user"></i>
        <input type="text" id="username" placeholder="admin" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()">
      <i class="ti ti-login"></i> Sign In
    </button>

    <div class="error-msg" id="errMsg">
      <i class="ti ti-alert-circle"></i> Invalid username or password.
    </div>

    <p class="footer-note">Saffarini Consultant Portal &mdash; Authorized Access Only</p>
  </div>

  <script>
    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('errMsg');
      if (u === 'admin' && p === 'admin123') {
        window.location.href = 'app.html';
      } else {
        err.style.display = 'flex';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        setTimeout(() => { err.style.display = 'none'; }, 3500);
      }
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('username').focus();
  </script>
</body>
</html>
